{% extends "base.html" %}
{% block title %}Edit Author{% endblock %}

{% block content %}
<h1>Edit Author</h1>

<form method="post">
    {% csrf_token %}

    <div class="form-group">
        <label for="{{ form.name.id_for_label }}">Name</label>
        {{ form.name }}
        {{ form.name.errors }}
    </div>

    <div class="form-group">
        <label for="{{ form.surname.id_for_label }}">Surname</label>
        {{ form.surname }}
        {{ form.surname.errors }}
    </div>

    <div class="form-group">
        <label for="{{ form.patronymic.id_for_label }}">Patronymic</label>
        {{ form.patronymic }}
        {{ form.patronymic.errors }}
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="/authors/">Cancel</a>
</form>
{% endblock %}
