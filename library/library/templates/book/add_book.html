{% extends "base.html" %}

{% block title %}Add Book - Library{% endblock %}

{% block content %}
<h1>Add New Book</h1>

{% if errors %}
<div class="errors">
    {% for error in errors %}
        <p>{{ error }}</p>
    {% endfor %}
</div>
{% endif %}

<div class="card">
    <form method="post" action="{% url 'book:add_book' %}" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="name">Title *</label>
            <input type="text" id="name" name="name" maxlength="128" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" maxlength="256">
        </div>

        <div class="form-group">
            <label for="count">Available Copies</label>
            <input type="number" id="count" name="count" value="10" min="0">
        </div>

        <div class="form-group">
            <label for="cover">Cover Image</label>
            <input type="file" id="cover" name="cover" accept="image/*">
        </div>

        <h2 style="margin-top: 20px;">Author</h2>

        <div class="form-group">
            <label for="author_name">Author First Name</label>
            <input type="text" id="author_name" name="author_name" maxlength="20">
        </div>

        <div class="form-group">
            <label for="author_surname">Author Last Name</label>
            <input type="text" id="author_surname" name="author_surname" maxlength="20">
        </div>

        <div class="form-group">
            <label for="author_patronymic">Author Patronymic</label>
            <input type="text" id="author_patronymic" name="author_patronymic" maxlength="20">
        </div>

        <button type="submit" class="btn btn-primary">Add Book</button>
        <a href="{% url 'book:book_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
