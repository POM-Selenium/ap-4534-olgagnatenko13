<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <title>{% block title %}Library{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            background-color: #f0e6f6;
            color: #2a1f30;
            min-height: 100vh;
        }
        h1, h2, h3, nav .brand {
            font-family: 'Playfair Display', Georgia, serif;
        }
        nav {
            background-color: #3c2a4d;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(40, 20, 60, 0.3);
        }
        nav .brand {
            color: #f8e8ff;
            font-size: 24px;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 1px;
        }
        nav .links { display: flex; gap: 20px; align-items: center; }
        nav .links a {
            color: #dcc8ea;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            transition: color 0.2s;
        }
        nav .links a:hover { color: #fff; }
        nav .user-info {
            color: #b89fca;
            font-size: 13px;
            font-weight: 700;
            margin-right: 10px;
        }
        .container {
            max-width: 960px;
            margin: 30px auto;
            padding: 0 20px;
        }
        h1 {
            font-size: 30px;
            margin-bottom: 20px;
            color: #3c2a4d;
            border-bottom: 3px solid #9b4dca;
            padding-bottom: 10px;
            font-weight: 900;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #4a2d6b;
            font-weight: 700;
        }
        a { color: #7b2fa0; text-decoration: none; font-weight: 700; }
        a:hover { text-decoration: underline; color: #5a1d78; }

        .btn {
            display: inline-block;
            padding: 10px 22px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Lato', sans-serif;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); text-decoration: none; box-shadow: 0 4px 10px rgba(60, 42, 77, 0.25); }
        .btn-primary { background-color: #7b2fa0; color: #fff; }
        .btn-primary:hover { background-color: #6a2090; }
        .btn-danger { background-color: #c0395e; color: #fff; }
        .btn-danger:hover { background-color: #a82e50; }
        .btn-secondary { background-color: #8c7a9e; color: #fff; }
        .btn-secondary:hover { background-color: #7a6890; }

        .card {
            background: #ffffff;
            border: 2px solid #d4b0e8;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 3px 12px rgba(80, 40, 120, 0.12);
        }
        .card h3 { margin-bottom: 8px; color: #3c2a4d; font-weight: 700; }
        .card p { color: #3d3040; font-size: 14px; line-height: 1.7; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(80, 40, 120, 0.12);
            border: 2px solid #d4b0e8;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e8d5f0;
            font-size: 14px;
            color: #2a1f30;
        }
        th {
            background-color: #3c2a4d;
            color: #f8e8ff;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 15px;
        }
        tr:hover { background-color: #f5eafa; }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #3c2a4d;
            font-weight: 900;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #c4a0d8;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Lato', sans-serif;
            background-color: #fdf8ff;
            color: #2a1f30;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #7b2fa0;
            box-shadow: 0 0 0 3px rgba(123, 47, 160, 0.2);
        }

        .errors {
            background: #fce0e8;
            border: 2px solid #c0395e;
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #7b1030;
            font-size: 14px;
            font-weight: 700;
        }
        .errors p { margin-bottom: 4px; }
        
        .errorlist {
            color: #7b1030;
            list-style: none;
            padding: 0;
            margin: 5px 0;
            font-size: 13px;
            font-weight: 700;
        }

        .filter-form {
            background: #fff;
            padding: 20px;
            border: 2px solid #d4b0e8;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            box-shadow: 0 3px 12px rgba(80, 40, 120, 0.12);
        }
        .filter-form .form-group { margin-bottom: 0; flex: 1; min-width: 180px; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }
        .badge-librarian { background: #7b2fa0; color: #fff; }
        .badge-visitor { background: #8c7a9e; color: #fff; }
        .badge-active { background: #4caf50; color: #fff; }
        .badge-returned { background: #8c7a9e; color: #fff; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8c7a9e;
            font-style: italic;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'authentication:home' %}" class="brand">Library</a>
        <div class="links">
            <a href="{% url 'book:book_list' %}">Books</a>
            <a href="/authors/">Authors</a>
            <a href="/orders/">Orders</a>
            {% if user.is_authenticated %}
                {% if user.role == 1 %}
                    <a href="{% url 'users:user_list' %}">Users</a>
                    <a href="{% url 'book:add_book' %}">Add Book</a>
                {% endif %}
                <span class="user-info">{{ user.first_name }} ({{ user.get_role_name }})</span>
                <a href="{% url 'authentication:logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'authentication:login' %}">Login</a>
                <a href="{% url 'authentication:register' %}">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
